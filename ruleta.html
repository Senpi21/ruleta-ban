<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: #0f172a;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
}

#header {
  text-align: center;
  padding: 20px 0 10px 0;
}

h1 { margin: 0; font-size: 30px; }

#infoBox {
  position: absolute;
  top: 20px;
  right: 30px;
  width: 380px;
  text-align: center;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #a78bfa;
  background: rgba(30,41,59,0.9);
  box-shadow: 0 0 20px rgba(167,139,250,0.4);
  font-size: 15px;
  z-index: 10;
}

#main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 80px;
  transform: translateX(80px);
}

#panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

textarea {
  width: 260px;
  height: 150px;
  background: #1e293b;
  border: 1px solid #334155;
  color: white;
  border-radius: 10px;
  padding: 10px;
  resize: none;
}

#spinBtn {
  height: 55px;
  font-size: 20px;
  background: #7c3aed;
  border: none;
  border-radius: 12px;
  color: white;
  box-shadow: 0 0 20px #7c3aed;
  cursor: pointer;
}

#elimBtn {
  height: 45px;
  background: #9333ea;
  border: none;
  border-radius: 10px;
  color: white;
  box-shadow: 0 0 20px #9333ea;
  cursor: pointer;
}

#joinBtn {
  height: 45px;
  background: #8b5cf6;
  border: none;
  border-radius: 10px;
  color: white;
  box-shadow: 0 0 20px #8b5cf6;
  cursor: pointer;
}

#container { 
  position: relative; 
  display: flex;
  flex-direction: column;
  align-items: center;
}

#wheelLogo {
  width: 260px; /* más grande pero sin exagerar */
  margin-bottom: 18px;

  filter:
    drop-shadow(0 0 8px #a78bfa)
    drop-shadow(0 0 18px #7c3aed);
}

#wheel {
  width: 480px;
  height: 480px;
  border-radius: 50%;
  border: 8px solid white;
  position: relative;
  overflow: hidden;
  transition: transform 6s cubic-bezier(0.1,0.8,0.2,1);
}

#pointer {
  position: absolute;
  top: 60%;
  left: calc(50% - 240px - 8px - 10px);
  transform: translateY(-50%);
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 20px solid #8b5cf6;
}

#resultBox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
}

#resultBox.active { opacity: 1; }

#resultText {
  background: #111827;
  padding: 30px 50px;
  border-radius: 12px;
  font-size: 26px;
}
</style>
</head>

<body>

<div id="header">
  <h1>Ruleta de BAN - Zidoshifu</h1>
</div>

<div id="infoBox">
  Escribe <b>!BAN</b> en el chat para unirte
</div>

<div id="main">

<div id="container">
  <img id="wheelLogo" src="logoshifu.png">
  <div id="pointer"></div>
  <div id="wheel"></div>
</div>

<div id="panel">
  <textarea id="listInput"></textarea>
  <button id="spinBtn" onclick="spin()">GIRAR</button>
  <button id="elimBtn" onclick="toggleElimination()">ELIMINACIÓN: OFF</button>
  <button id="joinBtn" onclick="toggleJoin()">UNIRSE: ON</button>
</div>

</div>

<div id="resultBox"><div id="resultText"></div></div>

<script>
const firebaseConfig = {
  apiKey: "X",
  databaseURL: "https://ruleta-211c5-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = [];
let currentRotation = 0;
let spinning = false;
let eliminationMode = false;
let joinEnabled = true;
let updatingFromFirebase = false;

const wheel = document.getElementById("wheel");
const input = document.getElementById("listInput");

const colors = ["#2e1065","#4c1d95","#5b21b6","#6d28d9","#7c3aed","#8b5cf6","#a78bfa","#c4b5fd"];

// 🔥 PLAYERS
db.ref("players").on("value", snap => {
  const data = snap.val() || [];

  updatingFromFirebase = true;

  if (!joinEnabled && data.length > players.length) {
    updatingFromFirebase = false;
    return;
  }

  players = data;
  input.value = players.join("\n");
  drawWheel();

  updatingFromFirebase = false;
});

// 🔥 JOIN BUTTON FIX
db.ref("joinEnabled").on("value", snap => {
  joinEnabled = snap.val() ?? true;

  const btn = document.getElementById("joinBtn");

  btn.innerText = joinEnabled ? "UNIRSE: ON" : "UNIRSE: OFF";
  btn.style.background = joinEnabled ? "#8b5cf6" : "#9333ea";
});

input.addEventListener("input", () => {
  if (updatingFromFirebase) return;

  players = input.value.split("\n").filter(x => x);
  drawWheel();
  db.ref("players").set(players);
});

function toggleJoin(){
  joinEnabled = !joinEnabled;

  const btn = document.getElementById("joinBtn");
  btn.innerText = joinEnabled ? "UNIRSE: ON" : "UNIRSE: OFF";
  btn.style.background = joinEnabled ? "#8b5cf6" : "#9333ea";

  db.ref("joinEnabled").set(joinEnabled);
}

function drawWheel(){
  if(!players.length){
    wheel.innerHTML="";
    wheel.style.background="transparent";
    return;
  }

  const angle = 360 / players.length;
  let gradient="";

  wheel.innerHTML="";

  players.forEach((p,i)=>{
    const start=i*angle;
    gradient+=`${colors[i%colors.length]} ${start}deg ${start+angle}deg,`;

    const text=document.createElement("div");
    text.innerText=p;
    text.style.position="absolute";
    text.style.left="50%";
    text.style.top="50%";
    text.style.transform=`rotate(${start+angle/2}deg) translate(0,-160px) rotate(90deg)`;
    text.style.width="140px";
    text.style.marginLeft="-70px";
    text.style.textAlign="center";
    wheel.appendChild(text);
  });

  wheel.style.background=`conic-gradient(${gradient.slice(0,-1)})`;
}

// 🔥 ELIMINATION BUTTON FIX
function toggleElimination(){
  eliminationMode = !eliminationMode;

  const btn = document.getElementById("elimBtn");

  btn.innerText = eliminationMode ? "ELIMINACIÓN: ON" : "ELIMINACIÓN: OFF";
  btn.style.background = eliminationMode ? "#8b5cf6" : "#9333ea";
}

function showResult(t){
  const box=document.getElementById("resultBox");
  const txt=document.getElementById("resultText");
  txt.innerText=t;
  box.classList.add("active");
  setTimeout(()=>box.classList.remove("active"),2500);
}

function spin(){
  if(!players.length||spinning)return;

  spinning=true;

  const btn=document.getElementById("spinBtn");
  btn.innerText="GIRANDO...";
  btn.disabled=true;

  const angle=360/players.length;
  const randomIndex=Math.floor(Math.random()*players.length);
  const targetAngle=randomIndex*angle+angle/2;

  const finalRotation=currentRotation+360*8+(270-targetAngle);

  wheel.style.transform=`rotate(${finalRotation}deg)`;
  currentRotation=finalRotation;

  setTimeout(()=>{
    spinning=false;
    btn.innerText="GIRAR";
    btn.disabled=false;

    const normalized=(currentRotation%360+360)%360;
    const pointerDeg=(360-normalized+270)%360;
    const winner=Math.floor(pointerDeg/angle)%players.length;

    if(eliminationMode){
      showResult("ELIMINADO: "+players[winner]);

      players.splice(winner,1);
      input.value=players.join("\n");
      drawWheel();
      db.ref("players").set(players);

      wheel.style.transition="none";
      wheel.style.transform="rotate(0deg)";
      currentRotation=0;
      wheel.offsetHeight;
      wheel.style.transition="transform 6s cubic-bezier(0.1,0.8,0.2,1)";
    }else{
      showResult("GANÓ: "+players[winner]);
    }

  },6000);
}
</script>

</body>
</html>
