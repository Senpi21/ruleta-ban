<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<div id="marcaSenpi">
  Senpi_Random<br>
  <span>RULETA 2.0.1</span>
</div>
<style>
* { box-sizing: border-box; }
#marcaSenpi{
  position: fixed;
  bottom: 12px;
  right: 16px;
  font-size: 12px;
  text-align: right;
  color: rgba(255,255,255,0.6);
  font-family: Arial;
  pointer-events: none;
  z-index: 999;
}

#marcaSenpi span{
  font-size: 10px;
  color: rgba(192,132,252,0.7);
}
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  color: white;
  background: linear-gradient(135deg, #0f172a, #1e1b4b, #3b0764);
  position: relative;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0.08;
  z-index:-1;
  background-image: url("https://www.transparenttextures.com/patterns/asanoha.png");
}

#bgOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 30%, rgba(168,85,247,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(192,132,252,0.2), transparent 40%);
  animation: glowMove 10s infinite alternate;
}

@keyframes glowMove{
  0%{ transform: translate(0,0) scale(1); }
  100%{ transform: translate(-40px,-30px) scale(1.1); }
}

#header {
  text-align: center;
  padding: 20px 0 10px 0;
}

h1 { margin: 0; font-size: 30px; }

#infoBox {
  position: absolute;
  top: 20px;
  right: 30px;
  width: 380px;
  text-align: center;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #a78bfa;
  background: rgba(30,41,59,0.9);
  box-shadow: 0 0 20px rgba(167,139,250,0.4);
  font-size: 15px;
  z-index: 10;
}

#main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 80px;
  transform: translateX(80px);
}

#panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

textarea {
  width: 260px;
  height: 150px;
  background: #1e293b;
  border: 1px solid #334155;
  color: white;
  border-radius: 10px;
  padding: 10px;
  resize: none;
}

#spinBtn {
  height: 55px;
  font-size: 20px;
  background: #7c3aed;
  border: none;
  border-radius: 12px;
  color: white;
  box-shadow: 0 0 20px #7c3aed;
  cursor: pointer;
  transition: all 0.3s ease;
}

#elimBtn {
  height: 45px;
  background: #9333ea;
  border: none;
  border-radius: 10px;
  color: white;
  box-shadow: 0 0 20px #9333ea;
  cursor: pointer;
}

#joinBtn {
  height: 45px;
  background: #8b5cf6;
  border: none;
  border-radius: 10px;
  color: white;
  box-shadow: 0 0 20px #8b5cf6;
  cursor: pointer;
}

#container { 
  position: relative; 
  display: flex;
  flex-direction: column;
  align-items: center;
}

#wheelLogo {
  width: 260px;
  margin-bottom: 18px;
  filter:
    drop-shadow(0 0 8px #a78bfa)
    drop-shadow(0 0 18px #7c3aed);
}

#wheel {
  width: 480px;
  height: 480px;
  border-radius: 50%;
  border: 8px solid white;
  position: relative;
  overflow: hidden;
  transition: transform 8s cubic-bezier(0.25, 0.1, 0.25, 1);
}

#pointer {
  position: absolute;
  top: 60%;
  left: calc(50% - 240px - 8px - 10px);
  transform: translateY(-50%);
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 20px solid #8b5cf6;
}

#resultBox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  z-index: 2000;
}

#resultBox.active { opacity: 1; }

#resultText {
  background: #111827;
  padding: 30px 50px;
  border-radius: 12px;
  font-size: 26px;
  border: 2px solid #7c3aed;
  text-align: center;
}

#cortina{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: radial-gradient(circle, #1e1b4b, #0f172a);
  z-index:9999;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.5s ease;
}

#cortina.activa{
  opacity:1;
  pointer-events:auto;
}

#cortinaLogo{
  width:320px;
  margin-bottom:30px;
  filter:
    drop-shadow(0 0 20px #a78bfa)
    drop-shadow(0 0 50px #7c3aed);
  animation: logoPulse 2s infinite ease-in-out;
}

#cargandoText{
  font-size:22px;
  color:#c084fc;
  letter-spacing:2px;
  animation: fadeText 1.5s infinite;
}

@keyframes logoPulse{
  50%{ transform: scale(1.15); }
}

@keyframes fadeText{
  0%,100%{ opacity:0.3; }
  50%{ opacity:1; }
}
</style>
</head>

<body>

<div id="bgOverlay"></div>

<div id="header">
  <h1>Ruleta de BAN - Zidoshifu</h1>
</div>

<div id="infoBox">
  Escribe <b>!BAN</b> en el chat para unirte
</div>

<div id="main">

<div id="container">
  <img id="wheelLogo" src="logoshifu.png">
  <div id="pointer"></div>
  <div id="wheel"></div>
</div>

<div id="panel">
  <textarea id="listInput"></textarea>
  <button id="spinBtn" onclick="spin()">GIRAR</button>
  <button id="elimBtn" onclick="toggleElimination()">ELIMINACIÓN: OFF</button>
  <button id="joinBtn" onclick="toggleJoin()">UNIRSE: ON</button>
</div>

</div>

<div id="resultBox"><div id="resultText"></div></div>

<button onclick="cambiarRuleta()" style="
position:fixed;
bottom:20px;
left:20px;
padding:12px 20px;
background:#7c3aed;
border:none;
border-radius:10px;
color:white;
box-shadow:0 0 20px #7c3aed;
cursor:pointer;
z-index:1000;
">
CAMBIAR RULETA
</button>

<div id="cortina">
  <img src="logoshifu.png" id="cortinaLogo">
  <div id="cargandoText">Cargando...</div>
</div>

<audio id="tickSound" src="tick.mp3"></audio>
<audio id="bellSound" src="BELL.mp3"></audio>

<script>
const firebaseConfig = {
  apiKey: "X",
  databaseURL: "https://ruleta-211c5-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = [];
let currentRotation = 0;
let spinning = false;
let eliminationMode = false;
let joinEnabled = true;
let updatingFromFirebase = false;
let modoRuleta = "ban";

const wheel = document.getElementById("wheel");
const input = document.getElementById("listInput");
const spinBtn = document.getElementById("spinBtn");

const colors = ["#2e1065","#4c1d95","#5b21b6","#6d28d9","#7c3aed","#8b5cf6","#a78bfa","#c4b5fd"];

// --- CARGAR JUGADORES ---
db.ref("players").on("value", snap => {
  const data = snap.val() || [];
  updatingFromFirebase = true;

  if (!joinEnabled && data.length > players.length && !spinning) {
    updatingFromFirebase = false;
    return;
  }

  players = data;
  input.value = players.join("\n");
  drawWheel();
  updatingFromFirebase = false;
});

// --- CONTROL DE UNIRSE Y FEEDBACK DEL BOTÓN GIRAR ---
db.ref("joinEnabled").on("value", snap => {
  joinEnabled = snap.val() ?? true;

  const btn = document.getElementById("joinBtn");
  btn.innerText = joinEnabled ? "UNIRSE: ON" : "UNIRSE: OFF";
  btn.style.background = joinEnabled ? "#8b5cf6" : "#9333ea";

  // Cambiar aspecto del botón girar si está bloqueado por Unirse: ON
  if (joinEnabled) {
    spinBtn.style.background = "#475569";
    spinBtn.style.boxShadow = "none";
    spinBtn.style.cursor = "not-allowed";
  } else {
    spinBtn.style.background = "#7c3aed";
    spinBtn.style.boxShadow = "0 0 20px #7c3aed";
    spinBtn.style.cursor = "pointer";
  }
});

db.ref("modoRuleta").on("value", snap => {
  const modo = snap.val() || "ban";
  modoRuleta = modo;
  aplicarModoRuleta();
});

function aplicarModoRuleta(){
  const info = document.getElementById("infoBox");
  const header = document.querySelector("#header h1");

  if(modoRuleta === "zing"){
    header.innerText = "ZING DIBUJO - Zidoshifu";
    info.innerHTML = "<b>ZING DIBUJO</b><br>Escribe <b>!Unirme</b> para entrar";
    info.style.border = "1px solid #c084fc";
    info.style.boxShadow = "0 0 25px rgba(192,132,252,0.7)";
    info.style.background = "rgba(88,28,135,0.9)";
  } else {
    header.innerText = "Ruleta de BAN - Zidoshifu";
    info.innerHTML = "Escribe <b>!BAN</b> en el chat para unirte";
    info.style.border = "1px solid #a78bfa";
    info.style.boxShadow = "0 0 20px rgba(167,139,250,0.4)";
    info.style.background = "rgba(30,41,59,0.9)";
  }
}

input.addEventListener("input", () => {
  if (updatingFromFirebase) return;
  players = input.value.split("\n").filter(x => x.trim() !== "");
  drawWheel();
  db.ref("players").set(players);
});

function toggleJoin(){
  joinEnabled = !joinEnabled;
  db.ref("joinEnabled").set(joinEnabled);
}

function drawWheel(){
  if(!players.length){
    wheel.innerHTML="";
    wheel.style.background="transparent";
    return;
  }

  const angle = 360 / players.length;
  let gradient="";
  wheel.innerHTML="";

  players.forEach((p,i)=>{
    const start=i*angle;
    gradient+=`${colors[i%colors.length]} ${start}deg ${start+angle}deg,`;

    const text=document.createElement("div");
    text.innerText=p;
    text.style.position="absolute";
    text.style.left="50%";
    text.style.top="50%";
    text.style.transform=`rotate(${start+angle/2}deg) translate(0,-160px) rotate(90deg)`;

    let size = 16;
    if (p.length > 10) size = 14;
    if (p.length > 14) size = 12;
    if (p.length > 18) size = 10;
    if (players.length > 12) size -= 1;
    if (players.length > 24) size -= 2;
    if (size < 7) size = 7;

    text.style.fontSize = size + "px";
    text.style.width="120px";
    text.style.marginLeft="-60px";
    text.style.textAlign="center";
    text.style.fontWeight="bold";
    text.style.textShadow="0 0 5px rgba(0,0,0,0.5)";
    wheel.appendChild(text);
  });

  wheel.style.background=`conic-gradient(${gradient.slice(0,-1)})`;
}

const tickSound = document.getElementById("tickSound");
const bellSound = document.getElementById("bellSound");
let tickingRAF = null;
let lastTickTime = 0;
let lastSegment = -1;

function toggleElimination(){
  eliminationMode = !eliminationMode;
  const btn = document.getElementById("elimBtn");
  btn.innerText = eliminationMode ? "ELIMINACIÓN: ON" : "ELIMINACIÓN: OFF";
  btn.style.background = eliminationMode ? "#8b5cf6" : "#9333ea";
}

function showResult(t){
  const box=document.getElementById("resultBox");
  const txt=document.getElementById("resultText");
  txt.innerText=t;
  box.classList.add("active");
  setTimeout(()=>box.classList.remove("active"),3000);
}

function spin(){
  // --- CORRECCIÓN SOLICITADA: Bloqueo si Unirse está ON ---
  if (joinEnabled) {
    showResult("(UNIRSE: OFF) PARA GIRAR");
    return;
  }

  if(!players.length || spinning) return;

  spinning=true;
  startRealTicking();
  
  spinBtn.innerText="GIRANDO...";
  spinBtn.disabled=true;

  const angle = 360 / players.length;
  const randomIndex = Math.floor(Math.random() * players.length);
  const targetAngle = randomIndex * angle + angle / 2;

  // Rotación: vueltas base + compensación para que el puntero (izquierda) marque bien
  const finalRotation = currentRotation + (360 * 15) + (270 - targetAngle);

  wheel.style.transition = "transform 8s cubic-bezier(0.25, 0.1, 0.25, 1)";
  wheel.style.transform=`rotate(${finalRotation}deg)`;
  currentRotation = finalRotation;

  wheel.addEventListener("transitionend", function handler(){
    wheel.removeEventListener("transitionend", handler);
    stopRealTicking();

    spinning=false;
    spinBtn.innerText="GIRAR";
    spinBtn.disabled=false;

    const normalized = (currentRotation % 360 + 360) % 360;
    const pointerDeg = (360 - normalized + 270) % 360;
    const winner = Math.floor(pointerDeg / angle) % players.length;

    if(eliminationMode){
      showResult("ELIMINADO: " + players[winner]);
      if(modoRuleta === "zing"){
        const s = bellSound.cloneNode();
        s.volume = 0.8;
        s.play().catch(()=>{});
      }
      players.splice(winner,1);
      input.value = players.join("\n");
      drawWheel();
      db.ref("players").set(players);

      wheel.style.transition = "none";
      wheel.style.transform = "rotate(0deg)";
      currentRotation = 0;
      wheel.offsetHeight;
      wheel.style.transition = "transform 8s cubic-bezier(0.25, 0.1, 0.25, 1)";
    } else {
      showResult("GANÓ: " + players[winner]);
    }
  });
}

function startRealTicking(){
  lastSegment = -1;
  function loop(){
    if(!spinning) return;
    const angle = 360 / players.length;
    const style = window.getComputedStyle(wheel);
    const matrix = new DOMMatrix(style.transform);
    let rotation = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
    if(rotation < 0) rotation += 360;
    const pointerDeg = (360 - rotation + 270) % 360;
    const currentSegment = Math.floor(pointerDeg / angle);

    if(currentSegment !== lastSegment){
      const now = Date.now();
      if(now - lastTickTime > 90){ // ⏱️ menos frecuencia (antes 45)
  lastTickTime = now;

  const tick = tickSound.cloneNode();

  tick.volume = 0.2; // 🔊 más suave (antes 0.5)

  tick.playbackRate = 1.1; // 🎧 un pelín más agudo para que no se sienta pesado

  tick.play().catch(()=>{});
}
      lastSegment = currentSegment;
    }
    tickingRAF = requestAnimationFrame(loop);
  }
  loop();
}

function stopRealTicking(){
  if(tickingRAF){
    cancelAnimationFrame(tickingRAF);
    tickingRAF = null;
  }
}

function cambiarRuleta(){
  const cortina = document.getElementById("cortina");
  cortina.classList.add("activa");
  setTimeout(()=>{
    modoRuleta = (modoRuleta === "ban") ? "zing" : "ban";
    db.ref("modoRuleta").set(modoRuleta);
  },600);
  setTimeout(()=>{
    cortina.classList.remove("activa");
  },1200);
}
</script>
</body>
</html>
