<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: #0f172a;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
}

/* HEADER */
#header {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 10px 0;
}

#logo {
  position: absolute;
  left: 20px;
  top: 5px;
}

#logo img {
  width: 240px;
  filter:
    drop-shadow(0 0 10px #f472b6)
    drop-shadow(0 0 30px #f472b6)
    drop-shadow(0 0 60px #f472b6);
}

h1 {
  margin: 0;
  font-size: 30px;
}

/* INFO */
#infoBox {
  margin: 5px auto;
  width: 360px;
  text-align: center;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #f472b6;
  background: rgba(30,41,59,0.9);
  box-shadow: 0 0 20px rgba(244,114,182,0.4);
  font-size: 14px;
}

#infoBox b { color: #f472b6; }

/* MAIN */
#main {
  flex: 1;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

/* PANEL */
#panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

textarea {
  width: 260px;
  height: 150px;
  background: #1e293b;
  border: 1px solid #334155;
  color: white;
  border-radius: 10px;
  padding: 10px;
  resize: none;
}

/* BOTONES */
#spinBtn {
  height: 55px;
  font-size: 20px;
  background: #22c55e;
  border: none;
  border-radius: 12px;
  color: white;
  box-shadow: 0 0 20px #22c55e;
  cursor: pointer;
}

#elimBtn {
  height: 45px;
  background: #ef4444;
  border: none;
  border-radius: 10px;
  color: white;
  box-shadow: 0 0 20px #ef4444;
  cursor: pointer;
}

/* RULETA */
#container { position: relative; }

#wheel {
  width: 550px;
  height: 550px;
  border-radius: 50%;
  border: 8px solid white;
  position: relative;
  overflow: hidden;
  transition: transform 6s cubic-bezier(0.1,0.8,0.2,1);
}

#pointer {
  position: absolute;
  top: 50%;
  left: -18px;
  transform: translateY(-50%);
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 20px solid #22c55e;
}

/* RESULTADO */
#resultBox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
}

#resultBox.active { opacity: 1; }

#resultText {
  background: #111827;
  padding: 30px 50px;
  border-radius: 12px;
  font-size: 26px;
  box-shadow: 0 0 30px #f472b6;
}
</style>

</head>
<body>

<div id="header">
  <div id="logo">
    <img src="logoshifu.png">
  </div>
  <h1>Ruleta de BAN - Zidoshifu</h1>
</div>

<div id="infoBox">
  Para participar necesitas seguirme<br>
  Escribe <b>!BAN</b> en el chat para añadirte a la ruleta<br>
  Mucha suerte
</div>

<div id="main">

  <div id="panel">
    <textarea id="listInput" placeholder="Escribe nombres (uno por línea)"></textarea>
    <button id="spinBtn" onclick="spin()">GIRAR</button>
    <button id="elimBtn" onclick="toggleElimination()">ELIMINACIÓN: OFF</button>
  </div>

  <div id="container">
    <div id="pointer"></div>
    <div id="wheel"></div>
  </div>

</div>

<div id="resultBox">
  <div id="resultText"></div>
</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "X",
  authDomain: "X",
  databaseURL: "https://ruleta-211c5-default-rtdb.firebaseio.com",
  projectId: "ruleta"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 CONTROL LOOP
let updatingFromFirebase = false;


// 🔥 FIREBASE → WEB
db.ref("players").on("value", snapshot => {
  const data = snapshot.val() || [];

  updatingFromFirebase = true;

  players = data;
  input.value = players.join("\n");

  drawWheel();

  updatingFromFirebase = false;
});


const wheel = document.getElementById("wheel");
const input = document.getElementById("listInput");

let players = [];
let currentRotation = 0;
let spinning = false;
let eliminationMode = false;

const colors = ["#ef4444","#3b82f6","#22c55e","#eab308","#a855f7","#f97316"];


// 🔥 MODIFICADO (SYNC)
input.addEventListener("input", () => {

  if (updatingFromFirebase) return;

  players = input.value.split("\n").map(x => x.trim()).filter(x => x);

  drawWheel();

  // 🔥 WEB → FIREBASE
  db.ref("players").set(players);
});


function drawWheel() {
  if (!players.length) {
    wheel.innerHTML = "";
    wheel.style.background = "transparent";
    return;
  }

  const angle = 360 / players.length;
  let gradient = "";

  wheel.innerHTML = "";

  players.forEach((p, i) => {
    const start = i * angle;
    const color = colors[i % colors.length];

    gradient += `${color} ${start}deg ${start + angle}deg,`;

    const text = document.createElement("div");
    text.innerText = p;

    text.style.position = "absolute";
    text.style.left = "50%";
    text.style.top = "50%";

    const angleCenter = start + angle / 2;

    text.style.transform = `
      rotate(${angleCenter}deg)
      translate(0, -180px)
      rotate(90deg)
    `;

    text.style.color = "white";
    text.style.fontWeight = "bold";
    text.style.textAlign = "center";
    text.style.width = "160px";
    text.style.marginLeft = "-80px";

    wheel.appendChild(text);
  });

  wheel.style.background = `conic-gradient(${gradient.slice(0, -1)})`;
}


function toggleElimination() {
  eliminationMode = !eliminationMode;
  const btn = document.getElementById("elimBtn");

  btn.innerText = eliminationMode ? "ELIMINACIÓN: ON" : "ELIMINACIÓN: OFF";
  btn.style.background = eliminationMode ? "#22c55e" : "#ef4444";
}


function showResult(text) {
  const box = document.getElementById("resultBox");
  const txt = document.getElementById("resultText");

  txt.innerText = text;
  box.classList.add("active");

  setTimeout(() => box.classList.remove("active"), 2500);
}


function spin() {
  if (!players.length || spinning) return;

  spinning = true;

  const angle = 360 / players.length;

  const randomIndex = Math.floor(Math.random() * players.length);
  const targetAngle = randomIndex * angle + angle / 2;

  const extraSpins = 8;

  const finalRotation = currentRotation + (360 * extraSpins) + (270 - targetAngle);

  wheel.style.transform = `rotate(${finalRotation}deg)`;
  currentRotation = finalRotation;

  setTimeout(() => {
    spinning = false;

    const normalized = (currentRotation % 360 + 360) % 360;
    const pointerDeg = (360 - normalized + 270) % 360;
    const winner = Math.floor(pointerDeg / angle) % players.length;

    if (eliminationMode) {
      showResult("ELIMINADO: " + players[winner]);
      players.splice(winner, 1);
      input.value = players.join("\n");
      drawWheel();

      // 🔥 ELIMINACIÓN → FIREBASE
      db.ref("players").set(players);

    } else {
      showResult("GANÓ: " + players[winner]);
    }

  }, 6000);
}

</script>

</body>
</html>
